<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Portuguese number drill</title>
</head>
<body>
  <div id="app"></div>
  <script src="elm.js"></script>
  <script>
    var app = Elm.Main.init({ node: document.getElementById("app") });
    var player = new Audio();
    app.ports.playAudio.subscribe(function (url) {
      player.src = url;
      player.play().catch(function () { /* autoplay blocked; replay button still works */ });
    });
  </script>
</body>
</html>
