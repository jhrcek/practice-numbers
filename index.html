<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Portuguese number drill</title>
  <style>
    body { font-family: sans-serif; max-width: 34rem; margin: 2rem auto; padding: 0 1rem; }
    h1 { font-size: 1.4rem; }
    h2 { font-size: 1rem; margin-bottom: 0.3rem; }
    section { margin: 1.2rem 0; }
    button { font-size: 1rem; padding: 0.4rem 0.8rem; margin: 0.15rem; cursor: pointer; }
    button.selected { outline: 2px solid #333; }
    input { font-size: 1rem; padding: 0.4rem; width: 6rem; }
    .big-number { font-size: 3rem; margin: 1rem 0; }
    .note { font-size: 1rem; color: #555; }
    .ok { color: green; }
    .bad { color: red; }
    .error { color: red; }
    .progress { color: #555; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="elm.js"></script>
  <script>
    var app = Elm.Main.init({ node: document.getElementById("app") });
    var player = new Audio();
    app.ports.playAudio.subscribe(function (url) {
      player.src = url;
      player.play().catch(function () { /* autoplay blocked; replay button still works */ });
    });
  </script>
</body>
</html>
